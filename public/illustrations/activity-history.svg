    <g transform="translate(30,65)">
      <rect x="0" y="0" width="180" height="35" rx="8" fill="white" stroke="#14b8a6" stroke-width="0.8" opacity="0.7"/>
      <rect x="8" y="8" width="60" height="5" rx="2" fill="#14b8a6" opacity="0.3"/>
      <rect x="8" y="18" width="90" height="4" rx="2" fill="#14b8a6" opacity="0.15"/>
      <rect x="140" y="10" width="30" height="14" rx="5" fill="#14b8a6" opacity="0.1"/>
      <text x="155" y="21" font-family="sans-serif" font-size="7" fill="#14b8a6" text-anchor="middle" font-weight="bold">WIN</text>
    </g>
    <g transform="translate(30,115)">
      <rect x="0" y="0" width="180" height="35" rx="8" fill="white" stroke="#6CA644" stroke-width="0.8" opacity="0.7"/>
      <rect x="8" y="8" width="45" height="5" rx="2" fill="#6CA644" opacity="0.3"/>
      <rect x="8" y="18" width="75" height="4" rx="2" fill="#6CA644" opacity="0.15"/>
      <rect x="140" y="10" width="30" height="14" rx="5" fill="#6CA644" opacity="0.1"/>
      <text x="155" y="21" font-family="sans-serif" font-size="7" fill="#6CA644" text-anchor="middle" font-weight="bold">WIN</text>
    </g>
    <g transform="translate(30,165)">
      <rect x="0" y="0" width="180" height="35" rx="8" fill="white" stroke="#a78bfa" stroke-width="0.8" opacity="0.7"/>
      <rect x="8" y="8" width="55" height="5" rx="2" fill="#a78bfa" opacity="0.3"/>
      <rect x="8" y="18" width="85" height="4" rx="2" fill="#a78bfa" opacity="0.15"/>
