<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="hSkin" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#d4a76a"/><stop offset="100%" stop-color="#b8894e"/></linearGradient>
  </defs>

  <rect width="400" height="300" fill="#f0fdf4"/>
  <circle cx="200" cy="150" r="110" fill="#6CA644" opacity="0.04"/>

  <!-- Timeline -->
