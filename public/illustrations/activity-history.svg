    <circle cx="15" cy="30" r="3" fill="#6CA644"/>
    <circle cx="15" cy="80" r="6" fill="#14b8a6" opacity="0.3"/>
    <circle cx="15" cy="80" r="3" fill="#14b8a6"/>
    <circle cx="15" cy="130" r="6" fill="#6CA644" opacity="0.3"/>
    <circle cx="15" cy="130" r="3" fill="#6CA644"/>
    <circle cx="15" cy="180" r="6" fill="#14b8a6" opacity="0.3"/>
    <circle cx="15" cy="180" r="3" fill="#14b8a6"/>

    <!-- Activity cards -->
    <g transform="translate(30,15)">
      <rect x="0" y="0" width="180" height="35" rx="8" fill="white" stroke="#6CA644" stroke-width="0.8" opacity="0.7"/>
