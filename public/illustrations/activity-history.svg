  <!-- Kid with clipboard -->
  <g transform="translate(310,100)">
    <rect x="10" y="45" width="38" height="50" rx="8" fill="#0D3E2D"/>
    <circle cx="29" cy="25" r="20" fill="url(#hSkin)"/>
    <path d="M12 18 Q17 5 29 2 Q41 5 46 18 Q43 10 29 8 Q15 10 12 18Z" fill="#1a0f05"/>
    <circle cx="22" cy="23" r="2.5" fill="#1a1a1a"/>
    <circle cx="36" cy="23" r="2.5" fill="#1a1a1a"/>
    <circle cx="23.3" cy="22" r="1" fill="white"/>
    <circle cx="37.3" cy="22" r="1" fill="white"/>
    <path d="M21 32 Q29 38 37 32" stroke="#1a1a1a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- Clipboard -->
    <rect x="-8" y="55" width="22" height="28" rx="4" fill="white" stroke="#6CA644" stroke-width="1" transform="rotate(-10,-8,55)"/>
    <rect x="-3" y="60" width="12" height="3" rx="1" fill="#6CA644" opacity="0.3" transform="rotate(-10,-3,60)"/>
    <rect x="-2" y="66" width="10" height="2" rx="1" fill="#6CA644" opacity="0.2" transform="rotate(-10,-2,66)"/>
    <rect x="15" y="90" width="10" height="22" rx="4" fill="#1e3a5f"/>
    <rect x="33" y="90" width="10" height="22" rx="4" fill="#1e3a5f"/>
