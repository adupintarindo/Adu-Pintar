  <g transform="translate(150,270)" opacity="0.5">
    <rect x="0" y="0" width="65" height="24" rx="8" fill="#14b8a6" opacity="0.12"/>
    <text x="32" y="16" font-family="sans-serif" font-size="8" fill="#14b8a6" text-anchor="middle" font-weight="bold">72% Win</text>
