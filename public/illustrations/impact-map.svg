<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" fill="#f0fdf4"/>

  <!-- Indonesia map silhouette (simplified) -->
  <g transform="translate(30,60)" opacity="0.12">
    <!-- Sumatra -->
    <path d="M20 80 Q30 50 50 40 Q65 35 70 55 Q75 75 60 95 Q45 115 25 100Z" fill="#6CA644"/>
    <!-- Java -->
    <path d="M90 120 Q110 110 150 110 Q170 108 175 115 Q170 122 140 125 Q110 128 90 120Z" fill="#6CA644"/>
    <!-- Kalimantan -->
    <path d="M120 50 Q140 30 170 35 Q195 40 200 65 Q195 85 175 90 Q155 95 135 80 Q120 70 120 50Z" fill="#6CA644"/>
    <!-- Sulawesi -->
    <path d="M220 40 Q230 30 240 40 Q250 55 235 70 Q245 60 255 65 Q250 80 235 85 Q225 75 220 60Z" fill="#6CA644"/>
    <!-- Papua -->
    <path d="M290 50 Q310 35 340 40 Q355 50 350 70 Q340 85 320 80 Q300 75 290 50Z" fill="#6CA644"/>
  </g>

  <!-- Connection dots on map -->
  <g>
    <circle cx="60" cy="130" r="6" fill="#6CA644" opacity="0.3"/>
    <circle cx="60" cy="130" r="3" fill="#6CA644" opacity="0.6"/>
    <circle cx="150" cy="145" r="8" fill="#6CA644" opacity="0.3"/>
    <circle cx="150" cy="145" r="4" fill="#6CA644" opacity="0.6"/>
    <circle cx="180" cy="100" r="6" fill="#14b8a6" opacity="0.3"/>
    <circle cx="180" cy="100" r="3" fill="#14b8a6" opacity="0.6"/>
    <circle cx="250" cy="105" r="5" fill="#14b8a6" opacity="0.3"/>
    <circle cx="250" cy="105" r="2.5" fill="#14b8a6" opacity="0.6"/>
    <circle cx="330" cy="95" r="5" fill="#6CA644" opacity="0.3"/>
    <circle cx="330" cy="95" r="2.5" fill="#6CA644" opacity="0.6"/>
    <!-- Connection lines -->
    <line x1="60" y1="130" x2="150" y2="145" stroke="#6CA644" stroke-width="1" opacity="0.15" stroke-dasharray="4,3"/>
    <line x1="150" y1="145" x2="180" y2="100" stroke="#6CA644" stroke-width="1" opacity="0.15" stroke-dasharray="4,3"/>
    <line x1="180" y1="100" x2="250" y2="105" stroke="#14b8a6" stroke-width="1" opacity="0.15" stroke-dasharray="4,3"/>
    <line x1="250" y1="105" x2="330" y2="95" stroke="#14b8a6" stroke-width="1" opacity="0.15" stroke-dasharray="4,3"/>
  </g>

  <!-- Stats cards -->
  <g transform="translate(40,190)">
    <rect x="0" y="0" width="90" height="55" rx="12" fill="white" stroke="#6CA644" stroke-width="1" opacity="0.7"/>
    <text x="45" y="25" font-family="sans-serif" font-size="16" fill="#6CA644" text-anchor="middle" font-weight="bold">500+</text>
    <text x="45" y="42" font-family="sans-serif" font-size="8" fill="#6CA644" text-anchor="middle" opacity="0.6">Sekolah</text>
  </g>
  <g transform="translate(155,190)">
    <rect x="0" y="0" width="90" height="55" rx="12" fill="white" stroke="#14b8a6" stroke-width="1" opacity="0.7"/>
    <text x="45" y="25" font-family="sans-serif" font-size="16" fill="#14b8a6" text-anchor="middle" font-weight="bold">25rb+</text>
    <text x="45" y="42" font-family="sans-serif" font-size="8" fill="#14b8a6" text-anchor="middle" opacity="0.6">Siswa</text>
  </g>
  <g transform="translate(270,190)">
    <rect x="0" y="0" width="90" height="55" rx="12" fill="white" stroke="#0D3E2D" stroke-width="1" opacity="0.7"/>
    <text x="45" y="25" font-family="sans-serif" font-size="16" fill="#0D3E2D" text-anchor="middle" font-weight="bold">34</text>
    <text x="45" y="42" font-family="sans-serif" font-size="8" fill="#0D3E2D" text-anchor="middle" opacity="0.6">Provinsi</text>
  </g>

  <!-- Growth arrows -->
  <g transform="translate(355,60)" opacity="0.3">
    <path d="M10 30 L10 5 M3 12 L10 5 L17 12" stroke="#6CA644" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Sparkle -->
  <g fill="#fbbf24" opacity="0.3">
    <circle cx="100" cy="50" r="3"/>
    <circle cx="300" cy="45" r="2.5"/>
  </g>

  <!-- Leaf decorations -->
  <g opacity="0.4">
    <ellipse cx="25" cy="270" rx="7" ry="11" fill="#6CA644" transform="rotate(-25,25,270)"/>
    <ellipse cx="375" cy="265" rx="6" ry="9" fill="#81c784" transform="rotate(20,375,265)"/>
  </g>
</svg>