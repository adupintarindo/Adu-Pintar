<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="dSkin1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f5d0a9"/><stop offset="100%" stop-color="#e8b888"/></linearGradient>
    <linearGradient id="dSkin2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#c68642"/><stop offset="100%" stop-color="#a0652f"/></linearGradient>
  </defs>

  <rect width="400" height="300" fill="#f0fdf4"/>
  <circle cx="200" cy="150" r="120" fill="#6CA644" opacity="0.05"/>

  <!-- VS badge -->
  <g transform="translate(175,100)">
    <circle cx="25" cy="25" r="25" fill="#0D3E2D"/>
    <text x="25" y="32" font-family="sans-serif" font-size="20" fill="white" text-anchor="middle" font-weight="bold">VS</text>
  </g>

  <!-- Lightning bolts around VS -->
  <g stroke="#fbbf24" stroke-width="2" fill="none" opacity="0.5" stroke-linecap="round">
    <path d="M170 110 L165 120 L175 118 L168 130"/>
    <path d="M230 110 L235 120 L225 118 L232 130"/>
  </g>

  <!-- Kid 1 (left challenger) -->
  <g transform="translate(40,100)">
    <rect x="15" y="60" width="50" height="65" rx="12" fill="#6CA644"/>
    <circle cx="40" cy="35" r="26" fill="url(#dSkin1)"/>
    <path d="M17 24 Q23 4 40 0 Q57 4 63 24 Q60 12 40 10 Q20 12 17 24Z" fill="#2c1810"/>
    <circle cx="31" cy="33" r="3.5" fill="#1a1a1a"/>
    <circle cx="49" cy="33" r="3.5" fill="#1a1a1a"/>
    <circle cx="32.5" cy="31.5" r="1.3" fill="white"/>
    <circle cx="50.5" cy="31.5" r="1.3" fill="white"/>
    <!-- Determined smile -->
    <path d="M30 45 Q40 52 50 45" stroke="#1a1a1a" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Fist pump arm -->
    <rect x="60" y="65" width="25" height="11" rx="5" fill="url(#dSkin1)" transform="rotate(-30,60,65)"/>
    <rect x="-5" y="80" width="24" height="11" rx="5" fill="url(#dSkin1)" transform="rotate(10,-5,80)"/>
    <rect x="22" y="120" width="13" height="28" rx="6" fill="#1e3a5f"/>
    <rect x="45" y="120" width="13" height="28" rx="6" fill="#1e3a5f"/>
  </g>

  <!-- Quiz bubble left -->
  <g transform="translate(25,40)" opacity="0.6">
    <rect x="0" y="0" width="85" height="50" rx="12" fill="white" stroke="#6CA644" stroke-width="1.5"/>
    <polygon points="50,50 60,62 65,50" fill="white" stroke="#6CA644" stroke-width="1.5"/>
    <polygon points="52,50 60,60 63,50" fill="white"/>
    <rect x="10" y="10" width="50" height="5" rx="2" fill="#6CA644" opacity="0.3"/>
    <rect x="10" y="20" width="60" height="4" rx="2" fill="#6CA644" opacity="0.2"/>
    <!-- Answer options -->
    <circle cx="15" cy="35" r="4" fill="#6CA644" opacity="0.2"/>
    <rect x="23" y="33" width="25" height="4" rx="2" fill="#6CA644" opacity="0.15"/>
    <circle cx="55" cy="35" r="4" fill="#6CA644" opacity="0.2"/>
    <rect x="63" y="33" width="12" height="4" rx="2" fill="#6CA644" opacity="0.15"/>
  </g>

  <!-- Kid 2 (right challenger) -->
  <g transform="translate(280,100)">
    <rect x="10" y="60" width="50" height="65" rx="12" fill="#14b8a6"/>
    <circle cx="35" cy="35" r="26" fill="url(#dSkin2)"/>
    <path d="M12 24 Q18 4 35 0 Q52 4 58 24 Q55 12 35 10 Q15 12 12 24Z" fill="#1a0f05"/>
    <circle cx="26" cy="33" r="3.5" fill="#1a1a1a"/>
    <circle cx="44" cy="33" r="3.5" fill="#1a1a1a"/>
    <circle cx="27.5" cy="31.5" r="1.3" fill="white"/>
    <circle cx="45.5" cy="31.5" r="1.3" fill="white"/>
    <path d="M25 45 Q35 52 45 45" stroke="#1a1a1a" stroke-width="2" fill="none" stroke-linecap="round"/>
    <rect x="-12" y="65" width="25" height="11" rx="5" fill="url(#dSkin2)" transform="rotate(30,-12,65)"/>
    <rect x="55" y="80" width="24" height="11" rx="5" fill="url(#dSkin2)" transform="rotate(-10,55,80)"/>
    <rect x="17" y="120" width="13" height="28" rx="6" fill="#1e3a5f"/>
    <rect x="40" y="120" width="13" height="28" rx="6" fill="#1e3a5f"/>
  </g>

  <!-- Quiz bubble right -->
  <g transform="translate(290,40)" opacity="0.6">
    <rect x="0" y="0" width="85" height="50" rx="12" fill="white" stroke="#14b8a6" stroke-width="1.5"/>
    <polygon points="20,50 25,62 35,50" fill="white" stroke="#14b8a6" stroke-width="1.5"/>
    <polygon points="22,50 26,59 33,50" fill="white"/>
    <rect x="10" y="10" width="55" height="5" rx="2" fill="#14b8a6" opacity="0.3"/>
    <rect x="10" y="20" width="40" height="4" rx="2" fill="#14b8a6" opacity="0.2"/>
    <circle cx="15" cy="35" r="4" fill="#14b8a6" opacity="0.2"/>
    <path d="M11 35 L19 35 M15 31 L15 39" stroke="#14b8a6" stroke-width="1.5" opacity="0.4"/>
    <rect x="23" y="33" width="30" height="4" rx="2" fill="#14b8a6" opacity="0.15"/>
  </g>

  <!-- Timer -->
  <g transform="translate(180,55)">
    <circle cx="20" cy="15" r="15" fill="white" stroke="#0D3E2D" stroke-width="2"/>
    <text x="20" y="20" font-family="sans-serif" font-size="12" fill="#0D3E2D" text-anchor="middle" font-weight="bold">30</text>
    <rect x="18" y="-2" width="4" height="6" rx="1" fill="#0D3E2D"/>
  </g>

  <!-- Score indicators -->
  <g transform="translate(30,250)" opacity="0.5">
    <rect x="0" y="0" width="70" height="25" rx="8" fill="#6CA644" opacity="0.15"/>
    <text x="35" y="17" font-family="sans-serif" font-size="11" fill="#6CA644" text-anchor="middle" font-weight="bold">850 pts</text>
  </g>
  <g transform="translate(300,250)" opacity="0.5">
    <rect x="0" y="0" width="70" height="25" rx="8" fill="#14b8a6" opacity="0.15"/>
    <text x="35" y="17" font-family="sans-serif" font-size="11" fill="#14b8a6" text-anchor="middle" font-weight="bold">820 pts</text>
  </g>

  <!-- Sparkle effects -->
  <g fill="#fbbf24" opacity="0.3">
    <path d="M150 200 L152 206 L158 206 L153 210 L155 216 L150 212 L145 216 L147 210 L142 206 L148 206Z" transform="scale(0.5)"/>
    <path d="M250 200 L252 206 L258 206 L253 210 L255 216 L250 212 L245 216 L247 210 L242 206 L248 206Z" transform="scale(0.5)"/>
  </g>
</svg>