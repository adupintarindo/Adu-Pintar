<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#fbbf24"/><stop offset="100%" stop-color="#d4a843"/></linearGradient>
    <linearGradient id="silver" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#cbd5e1"/><stop offset="100%" stop-color="#94a3b8"/></linearGradient>
    <linearGradient id="bronze" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#d4a76a"/><stop offset="100%" stop-color="#b8894e"/></linearGradient>
  </defs>

  <rect width="400" height="300" fill="#f0fdf4"/>

  <!-- Confetti -->
  <g opacity="0.3">
    <rect x="50" y="30" width="6" height="10" rx="2" fill="#6CA644" transform="rotate(30,50,30)"/>
    <rect x="100" y="20" width="5" height="8" rx="1.5" fill="#14b8a6" transform="rotate(-20,100,20)"/>
    <rect x="180" y="15" width="6" height="10" rx="2" fill="#fbbf24" transform="rotate(45,180,15)"/>
    <rect x="250" y="25" width="5" height="8" rx="1.5" fill="#a78bfa" transform="rotate(-35,250,25)"/>
    <rect x="320" y="20" width="6" height="10" rx="2" fill="#6CA644" transform="rotate(15,320,20)"/>
    <rect x="360" y="35" width="5" height="8" rx="1.5" fill="#14b8a6" transform="rotate(-25,360,35)"/>
    <circle cx="70" cy="50" r="3" fill="#fbbf24"/>
    <circle cx="150" cy="40" r="2.5" fill="#6CA644"/>
    <circle cx="280" cy="35" r="3" fill="#a78bfa"/>
    <circle cx="340" cy="50" r="2" fill="#14b8a6"/>
    <rect x="130" y="45" width="4" height="6" rx="1" fill="#6CA644" transform="rotate(60,130,45)"/>
    <rect x="220" y="35" width="4" height="6" rx="1" fill="#fbbf24" transform="rotate(-40,220,35)"/>
  </g>

  <!-- Podium - 2nd place (left) -->
  <rect x="70" y="190" width="90" height="80" rx="8" fill="url(#silver)"/>
  <text x="115" y="240" font-family="sans-serif" font-size="28" fill="white" text-anchor="middle" font-weight="bold" opacity="0.5">2</text>

  <!-- Podium - 1st place (center, taller) -->
  <rect x="155" y="160" width="90" height="110" rx="8" fill="url(#gold)"/>
  <text x="200" y="220" font-family="sans-serif" font-size="32" fill="white" text-anchor="middle" font-weight="bold" opacity="0.5">1</text>

  <!-- Podium - 3rd place (right) -->
  <rect x="240" y="210" width="90" height="60" rx="8" fill="url(#bronze)"/>
  <text x="285" y="250" font-family="sans-serif" font-size="24" fill="white" text-anchor="middle" font-weight="bold" opacity="0.5">3</text>

  <!-- Kid 2nd place -->
  <g transform="translate(88,110)">
    <rect x="10" y="40" width="35" height="45" rx="8" fill="#14b8a6"/>
    <circle cx="27" cy="22" r="18" fill="#c68642"/>
    <path d="M12 15 Q17 3 27 0 Q37 3 42 15 Q40 8 27 6 Q14 8 12 15Z" fill="#1a0f05"/>
    <circle cx="20" cy="20" r="2.5" fill="#1a1a1a"/>
    <circle cx="34" cy="20" r="2.5" fill="#1a1a1a"/>
    <path d="M19 28 Q27 34 35 28" stroke="#1a1a1a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- Silver medal -->
    <circle cx="27" cy="52" r="6" fill="url(#silver)" stroke="white" stroke-width="1.5"/>
  </g>

  <!-- Kid 1st place -->
  <g transform="translate(168,70)">
    <rect x="12" y="48" width="40" height="55" rx="10" fill="#6CA644"/>
    <circle cx="32" cy="26" r="22" fill="#f5d0a9"/>
    <path d="M14 18 Q20 2 32 -1 Q44 2 50 18 Q47 8 32 6 Q17 8 14 18Z" fill="#2c1810"/>
    <circle cx="24" cy="24" r="3" fill="#1a1a1a"/>
    <circle cx="40" cy="24" r="3" fill="#1a1a1a"/>
    <circle cx="25.3" cy="23" r="1.1" fill="white"/>
    <circle cx="41.3" cy="23" r="1.1" fill="white"/>
    <path d="M22 34 Q32 42 42 34" stroke="#1a1a1a" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M26 36 L38 36" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <!-- Arms up celebrating -->
    <rect x="-5" y="45" width="22" height="10" rx="5" fill="#f5d0a9" transform="rotate(-55,-5,45)"/>
    <rect x="48" y="45" width="22" height="10" rx="5" fill="#f5d0a9" transform="rotate(55,48,45)"/>
    <!-- Gold medal -->
    <circle cx="32" cy="62" r="7" fill="url(#gold)" stroke="white" stroke-width="1.5"/>
    <!-- Crown -->
    <g transform="translate(19,-5)">
      <path d="M0 12 L5 2 L10 8 L15 0 L20 8 L25 2 L25 12Z" fill="#fbbf24"/>
      <circle cx="5" cy="2" r="2" fill="#fef3c7"/>
      <circle cx="15" cy="0" r="2" fill="#fef3c7"/>
      <circle cx="25" cy="2" r="2" fill="#fef3c7"/>
    </g>
  </g>

  <!-- Kid 3rd place -->
  <g transform="translate(258,130)">
    <rect x="10" y="40" width="35" height="45" rx="8" fill="#0D3E2D"/>
    <circle cx="27" cy="22" r="18" fill="#d4a76a"/>
    <path d="M12 15 Q17 -2 27 -5 Q37 -2 42 15 Q42 28 38 38 L16 38 Q12 28 12 15Z" fill="#6366f1" opacity="0.8"/>
    <path d="M15 16 Q20 6 27 4 Q34 6 39 16 Q36 22 27 20 Q18 22 15 16Z" fill="#d4a76a"/>
    <circle cx="20" cy="20" r="2.5" fill="#1a1a1a"/>
    <circle cx="34" cy="20" r="2.5" fill="#1a1a1a"/>
    <path d="M19 28 Q27 34 35 28" stroke="#1a1a1a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- Bronze medal -->
    <circle cx="27" cy="52" r="6" fill="url(#bronze)" stroke="white" stroke-width="1.5"/>
  </g>

  <!-- Trophy -->
  <g transform="translate(180,40)" opacity="0.25">
    <path d="M10 0 L30 0 L28 15 Q20 20 12 15Z" fill="#fbbf24"/>
    <rect x="16" y="15" width="8" height="6" rx="1" fill="#d4a843"/>
    <rect x="12" y="21" width="16" height="4" rx="2" fill="#fbbf24"/>
    <path d="M5 2 Q0 8 5 14" stroke="#fbbf24" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M35 2 Q40 8 35 14" stroke="#fbbf24" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Leaf decorations -->
  <g opacity="0.4">
    <ellipse cx="40" cy="260" rx="8" ry="12" fill="#6CA644" transform="rotate(-20,40,260)"/>
    <ellipse cx="370" cy="255" rx="7" ry="10" fill="#81c784" transform="rotate(15,370,255)"/>
  </g>
</svg>