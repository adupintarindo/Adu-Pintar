<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="mSkin" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f5d0a9"/><stop offset="100%" stop-color="#e8b888"/></linearGradient>
  </defs>

  <rect width="400" height="300" fill="#f0fdf4"/>
  <circle cx="200" cy="150" r="110" fill="#6CA644" opacity="0.05"/>

  <!-- Stack of books -->
  <g transform="translate(80,100)">
    <rect x="0" y="80" width="120" height="22" rx="4" fill="#6CA644" transform="rotate(-3,0,80)"/>
    <rect x="-5" y="58" width="130" height="22" rx="4" fill="#14b8a6" transform="rotate(2,-5,58)"/>
    <rect x="2" y="36" width="115" height="22" rx="4" fill="#0D3E2D" transform="rotate(-1,2,36)"/>
    <rect x="-3" y="14" width="125" height="22" rx="4" fill="#6CA644" opacity="0.7" transform="rotate(3,-3,14)"/>
    <!-- Open book on top -->
    <g transform="translate(20,-20)">
      <path d="M40 20 Q20 15 0 25 L0 55 Q20 45 40 50Z" fill="white" stroke="#6CA644" stroke-width="1"/>
      <path d="M40 20 Q60 15 80 25 L80 55 Q60 45 40 50Z" fill="white" stroke="#6CA644" stroke-width="1"/>
      <line x1="8" y1="32" x2="32" y2="28" stroke="#6CA644" stroke-width="1" opacity="0.3"/>
      <line x1="8" y1="38" x2="30" y2="34" stroke="#6CA644" stroke-width="1" opacity="0.3"/>
      <line x1="8" y1="44" x2="28" y2="40" stroke="#6CA644" stroke-width="1" opacity="0.3"/>
      <line x1="48" y1="28" x2="72" y2="32" stroke="#6CA644" stroke-width="1" opacity="0.3"/>
      <line x1="50" y1="34" x2="72" y2="38" stroke="#6CA644" stroke-width="1" opacity="0.3"/>
      <line x1="52" y1="40" x2="72" y2="44" stroke="#6CA644" stroke-width="1" opacity="0.3"/>
    </g>
  </g>

  <!-- Kid reading -->
  <g transform="translate(240,80)">
    <rect x="15" y="60" width="50" height="65" rx="12" fill="#0D3E2D"/>
    <circle cx="40" cy="35" r="26" fill="url(#mSkin)"/>
    <path d="M17 24 Q23 4 40 0 Q57 4 63 24 Q60 12 40 10 Q20 12 17 24Z" fill="#2c1810"/>
    <circle cx="31" cy="33" r="3.5" fill="#1a1a1a"/>
    <circle cx="49" cy="33" r="3.5" fill="#1a1a1a"/>
    <circle cx="32.5" cy="31.5" r="1.3" fill="white"/>
    <circle cx="50.5" cy="31.5" r="1.3" fill="white"/>
    <!-- Reading smile -->
    <path d="M30 45 Q40 50 50 45" stroke="#1a1a1a" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Arms holding book -->
    <rect x="-10" y="75" width="30" height="11" rx="5" fill="url(#mSkin)" transform="rotate(-15,-10,75)"/>
    <rect x="50" y="75" width="30" height="11" rx="5" fill="url(#mSkin)" transform="rotate(15,50,75)"/>
    <rect x="22" y="120" width="13" height="28" rx="6" fill="#1e3a5f"/>
    <rect x="45" y="120" width="13" height="28" rx="6" fill="#1e3a5f"/>
  </g>

  <!-- Floating leaves -->
  <g opacity="0.4">
    <ellipse cx="50" cy="60" rx="8" ry="12" fill="#6CA644" transform="rotate(-30,50,60)"/>
    <ellipse cx="350" cy="80" rx="7" ry="10" fill="#81c784" transform="rotate(20,350,80)"/>
    <ellipse cx="370" cy="240" rx="6" ry="9" fill="#6CA644" transform="rotate(-15,370,240)"/>
  </g>

  <!-- Knowledge sparkles -->
  <g fill="#fbbf24" opacity="0.35">
    <circle cx="180" cy="50" r="3"/>
    <circle cx="320" cy="60" r="2.5"/>
    <circle cx="280" cy="230" r="2"/>
  </g>

  <!-- Progress badge -->
  <g transform="translate(100,240)" opacity="0.5">
    <rect x="0" y="0" width="80" height="28" rx="10" fill="#6CA644" opacity="0.12"/>
    <text x="40" y="18" font-family="sans-serif" font-size="9" fill="#6CA644" text-anchor="middle" font-weight="bold">12 Modul</text>
  </g>
  <g transform="translate(200,240)" opacity="0.5">
    <rect x="0" y="0" width="80" height="28" rx="10" fill="#14b8a6" opacity="0.12"/>
    <text x="40" y="18" font-family="sans-serif" font-size="9" fill="#14b8a6" text-anchor="middle" font-weight="bold">3 Topik</text>
  </g>
</svg>