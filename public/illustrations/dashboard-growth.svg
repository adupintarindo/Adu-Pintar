<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="gSkin" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#d4a76a"/><stop offset="100%" stop-color="#b8894e"/></linearGradient>
    <linearGradient id="chart" x1="0" y1="1" x2="0" y2="0"><stop offset="0%" stop-color="#6CA644" stop-opacity="0.05"/><stop offset="100%" stop-color="#6CA644" stop-opacity="0.25"/></linearGradient>
  </defs>

  <rect width="400" height="300" fill="#f0fdf4"/>

  <!-- Chart background -->
  <g transform="translate(120,40)">
    <rect x="0" y="0" width="250" height="200" rx="15" fill="white" stroke="#6CA644" stroke-width="1" opacity="0.5"/>

    <!-- Grid lines -->
    <g stroke="#6CA644" stroke-width="0.5" opacity="0.15">
      <line x1="30" y1="40" x2="230" y2="40"/>
      <line x1="30" y1="80" x2="230" y2="80"/>
      <line x1="30" y1="120" x2="230" y2="120"/>
      <line x1="30" y1="160" x2="230" y2="160"/>
    </g>

    <!-- Chart area fill -->
    <path d="M40 170 L80 145 L120 130 L160 100 L200 70 L220 50 L220 180 L40 180Z" fill="url(#chart)"/>

    <!-- Chart line (growth curve like a plant) -->
    <path d="M40 170 Q60 155 80 145 Q100 138 120 130 Q140 115 160 100 Q180 82 200 70 Q210 58 220 50" stroke="#6CA644" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Data points -->
    <circle cx="40" cy="170" r="4" fill="white" stroke="#6CA644" stroke-width="2"/>
    <circle cx="80" cy="145" r="4" fill="white" stroke="#6CA644" stroke-width="2"/>
    <circle cx="120" cy="130" r="4" fill="white" stroke="#6CA644" stroke-width="2"/>
    <circle cx="160" cy="100" r="4" fill="white" stroke="#6CA644" stroke-width="2"/>
    <circle cx="200" cy="70" r="4" fill="white" stroke="#6CA644" stroke-width="2"/>
    <circle cx="220" cy="50" r="5" fill="#6CA644" stroke="white" stroke-width="2"/>

    <!-- Plant growing from top of chart -->
    <g transform="translate(215,20)">
      <path d="M5 30 Q3 15 8 0 Q10 -10 5 -20" stroke="#4a8c2a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <ellipse cx="-3" cy="5" rx="8" ry="6" fill="#6CA644" opacity="0.7" transform="rotate(-25,-3,5)"/>
      <ellipse cx="15" cy="-5" rx="7" ry="5" fill="#81c784" opacity="0.6" transform="rotate(20,15,-5)"/>
      <ellipse cx="2" cy="-18" rx="6" ry="5" fill="#6CA644" opacity="0.8" transform="rotate(-15,2,-18)"/>
      <!-- Flower -->
      <circle cx="5" cy="-26" r="4" fill="#fbbf24" opacity="0.5"/>
      <circle cx="5" cy="-26" r="2" fill="#fef3c7"/>
    </g>

    <!-- Y-axis labels -->
    <g font-family="sans-serif" font-size="8" fill="#6CA644" opacity="0.4" text-anchor="end">
      <text x="25" y="43">100</text>
      <text x="25" y="83">75</text>
      <text x="25" y="123">50</text>
      <text x="25" y="163">25</text>
    </g>

    <!-- X-axis labels -->
    <g font-family="sans-serif" font-size="8" fill="#6CA644" opacity="0.4" text-anchor="middle">
      <text x="40" y="195">Sen</text>
      <text x="80" y="195">Sel</text>
      <text x="120" y="195">Rab</text>
      <text x="160" y="195">Kam</text>
      <text x="200" y="195">Jum</text>
      <text x="220" y="195">Sab</text>
    </g>
  </g>

  <!-- Kid character looking at chart -->
  <g transform="translate(20,110)">
    <rect x="12" y="55" width="45" height="60" rx="10" fill="#0D3E2D"/>
    <circle cx="34" cy="32" r="24" fill="url(#gSkin)"/>
    <path d="M13 22 Q19 3 34 0 Q49 3 55 22 Q53 12 34 10 Q15 12 13 22Z" fill="#1a0f05"/>
    <circle cx="25" cy="30" r="3" fill="#1a1a1a"/>
    <circle cx="43" cy="30" r="3" fill="#1a1a1a"/>
    <circle cx="26.3" cy="29" r="1.1" fill="white"/>
    <circle cx="44.3" cy="29" r="1.1" fill="white"/>
    <!-- Happy surprised look -->
    <path d="M24 40 Q34 48 44 40" stroke="#1a1a1a" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Arm pointing at chart -->
    <rect x="52" y="60" width="30" height="10" rx="5" fill="url(#gSkin)" transform="rotate(-25,52,60)"/>
    <rect x="-8" y="75" width="24" height="10" rx="5" fill="url(#gSkin)" transform="rotate(10,-8,75)"/>
    <rect x="18" y="110" width="12" height="28" rx="5" fill="#1e3a5f"/>
    <rect x="40" y="110" width="12" height="28" rx="5" fill="#1e3a5f"/>
  </g>

  <!-- Stats badges -->
  <g transform="translate(140,255)" opacity="0.5">
    <rect x="0" y="0" width="65" height="28" rx="10" fill="#6CA644" opacity="0.12"/>
    <text x="32" y="18" font-family="sans-serif" font-size="9" fill="#6CA644" text-anchor="middle" font-weight="bold">+45% EXP</text>
  </g>
  <g transform="translate(215,255)" opacity="0.5">
    <rect x="0" y="0" width="65" height="28" rx="10" fill="#14b8a6" opacity="0.12"/>
    <text x="32" y="18" font-family="sans-serif" font-size="9" fill="#14b8a6" text-anchor="middle" font-weight="bold">Level Up!</text>
  </g>
  <g transform="translate(290,255)" opacity="0.5">
    <rect x="0" y="0" width="65" height="28" rx="10" fill="#fbbf24" opacity="0.15"/>
    <text x="32" y="18" font-family="sans-serif" font-size="9" fill="#d4a843" text-anchor="middle" font-weight="bold">5 Streak</text>
  </g>

  <!-- Up arrow -->
  <g transform="translate(365,80)" opacity="0.3">
    <path d="M10 30 L10 5 M3 12 L10 5 L17 12" stroke="#6CA644" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>