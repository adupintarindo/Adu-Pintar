<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="fSkin" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#c68642"/><stop offset="100%" stop-color="#a0652f"/></linearGradient>
  </defs>

  <rect width="400" height="300" fill="#f0fdf4"/>
  <circle cx="200" cy="150" r="120" fill="#6CA644" opacity="0.06"/>

  <!-- Big question mark (background) -->
  <text x="200" y="200" font-family="sans-serif" font-size="200" fill="#6CA644" text-anchor="middle" font-weight="bold" opacity="0.06">?</text>

  <!-- Teacher/mentor character -->
  <g transform="translate(140,60)">
    <rect x="20" y="75" width="55" height="75" rx="14" fill="#0D3E2D"/>
    <circle cx="47" cy="45" r="32" fill="url(#fSkin)"/>
    <path d="M18 32 Q25 8 47 4 Q69 8 76 32 Q73 18 47 15 Q21 18 18 32Z" fill="#1a0f05"/>
    <!-- Glasses -->
    <circle cx="36" cy="42" r="8" fill="none" stroke="#2a2a3e" stroke-width="2"/>
    <circle cx="58" cy="42" r="8" fill="none" stroke="#2a2a3e" stroke-width="2"/>
    <line x1="44" y1="42" x2="50" y2="42" stroke="#2a2a3e" stroke-width="2"/>
    <!-- Eyes behind glasses -->
    <circle cx="36" cy="42" r="3" fill="#1a1a1a"/>
    <circle cx="58" cy="42" r="3" fill="#1a1a1a"/>
    <circle cx="37.5" cy="41" r="1.2" fill="white"/>
    <circle cx="59.5" cy="41" r="1.2" fill="white"/>
    <!-- Friendly smile -->
    <path d="M35 58 Q47 68 59 58" stroke="#1a1a1a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Arms -->
    <rect x="-5" y="90" width="28" height="12" rx="6" fill="url(#fSkin)" transform="rotate(-20,-5,90)"/>
    <rect x="70" y="85" width="28" height="12" rx="6" fill="url(#fSkin)" transform="rotate(25,70,85)"/>
    <!-- Legs -->
    <rect x="28" y="145" width="14" height="30" rx="6" fill="#1e3a5f"/>
    <rect x="52" y="145" width="14" height="30" rx="6" fill="#1e3a5f"/>
  </g>

  <!-- Floating question mark bubbles -->
  <g>
    <circle cx="80" cy="80" r="22" fill="#6CA644" opacity="0.1"/>
    <text x="80" y="88" font-family="sans-serif" font-size="22" fill="#6CA644" text-anchor="middle" font-weight="bold" opacity="0.5">?</text>

    <circle cx="320" cy="70" r="18" fill="#14b8a6" opacity="0.1"/>
    <text x="320" y="77" font-family="sans-serif" font-size="18" fill="#14b8a6" text-anchor="middle" font-weight="bold" opacity="0.5">?</text>

    <circle cx="60" cy="200" r="16" fill="#6366f1" opacity="0.08"/>
    <text x="60" y="206" font-family="sans-serif" font-size="16" fill="#6366f1" text-anchor="middle" font-weight="bold" opacity="0.4">?</text>

    <circle cx="340" cy="180" r="20" fill="#6CA644" opacity="0.08"/>
    <text x="340" y="187" font-family="sans-serif" font-size="20" fill="#6CA644" text-anchor="middle" font-weight="bold" opacity="0.4">?</text>
  </g>

  <!-- Book stack (left) -->
  <g transform="translate(40,130)" opacity="0.6">
    <rect x="0" y="30" width="45" height="12" rx="3" fill="#14b8a6" transform="rotate(-5,0,30)"/>
    <rect x="-2" y="18" width="48" height="12" rx="3" fill="#6CA644" transform="rotate(3,-2,18)"/>
    <rect x="1" y="6" width="43" height="12" rx="3" fill="#0D3E2D" transform="rotate(-2,1,6)"/>
  </g>

  <!-- Light bulb (right) -->
  <g transform="translate(310,110)" opacity="0.5">
    <circle cx="20" cy="15" r="16" fill="#fbbf24" opacity="0.3"/>
    <circle cx="20" cy="15" r="12" fill="#fbbf24" opacity="0.2"/>
    <path d="M14 30 L26 30 L24 38 L16 38Z" fill="#fbbf24" opacity="0.4"/>
    <rect x="16" y="38" width="8" height="3" rx="1" fill="#d4a843" opacity="0.3"/>
    <!-- Rays -->
    <line x1="20" y1="-5" x2="20" y2="-10" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
    <line x1="35" y1="5" x2="40" y2="0" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
    <line x1="5" y1="5" x2="0" y2="0" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
    <line x1="38" y1="20" x2="43" y2="20" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
    <line x1="2" y1="20" x2="-3" y2="20" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  </g>

  <!-- Nature elements -->
  <g transform="translate(320,230)" opacity="0.5">
    <rect x="3" y="5" width="2.5" height="20" rx="1" fill="#4a8c2a"/>
    <ellipse cx="4" cy="3" rx="8" ry="12" fill="#6CA644"/>
  </g>
  <g transform="translate(60,250)" opacity="0.5">
    <rect x="3" y="5" width="2.5" height="18" rx="1" fill="#4a8c2a"/>
    <ellipse cx="4" cy="3" rx="7" ry="10" fill="#81c784"/>
  </g>

  <!-- Checkmark answers -->
  <g opacity="0.35">
    <circle cx="300" cy="250" r="14" fill="#6CA644" opacity="0.15"/>
    <path d="M293 250 L298 256 L308 244" stroke="#6CA644" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="100" cy="260" r="12" fill="#14b8a6" opacity="0.15"/>
    <path d="M94 260 L98 265 L107 255" stroke="#14b8a6" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>