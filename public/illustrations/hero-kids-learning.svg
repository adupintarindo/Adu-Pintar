<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f5e9"/>
      <stop offset="100%" stop-color="#f0fdf4"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6CA644"/>
      <stop offset="100%" stop-color="#4a8c2a"/>
    </linearGradient>
    <linearGradient id="leaf1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6CA644"/>
      <stop offset="100%" stop-color="#0D3E2D"/>
    </linearGradient>
    <linearGradient id="skin1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5d0a9"/>
      <stop offset="100%" stop-color="#e8b888"/>
    </linearGradient>
    <linearGradient id="skin2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c68642"/>
      <stop offset="100%" stop-color="#a0652f"/>
    </linearGradient>
    <linearGradient id="skin3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4a76a"/>
      <stop offset="100%" stop-color="#b8894e"/>
    </linearGradient>
    <linearGradient id="tablet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#sky)"/>

  <!-- Sun -->
  <circle cx="680" cy="80" r="50" fill="url(#sun)" opacity="0.7"/>
  <circle cx="680" cy="80" r="40" fill="#fef3c7" opacity="0.5"/>

  <!-- Clouds -->
  <g opacity="0.4" fill="white">
    <ellipse cx="150" cy="70" rx="60" ry="25"/>
    <ellipse cx="120" cy="60" rx="40" ry="20"/>
    <ellipse cx="180" cy="65" rx="35" ry="18"/>
    <ellipse cx="550" cy="50" rx="50" ry="20"/>
    <ellipse cx="520" cy="42" rx="35" ry="16"/>
    <ellipse cx="575" cy="45" rx="30" ry="15"/>
  </g>

  <!-- Hills -->
  <ellipse cx="200" cy="380" rx="250" ry="80" fill="#8bc34a" opacity="0.3"/>
  <ellipse cx="600" cy="390" rx="280" ry="90" fill="#81c784" opacity="0.25"/>

  <!-- Ground -->
  <rect x="0" y="370" width="800" height="130" rx="0" fill="url(#ground)" opacity="0.15"/>
  <path d="M0 400 Q200 370 400 390 Q600 410 800 380 L800 500 L0 500Z" fill="url(#ground)" opacity="0.12"/>

  <!-- Tall plant left -->
  <g transform="translate(80,200)">
    <rect x="8" y="40" width="5" height="160" rx="2" fill="#4a8c2a"/>
    <ellipse cx="10" cy="50" rx="22" ry="30" fill="url(#leaf1)" opacity="0.8" transform="rotate(-20,10,50)"/>
    <ellipse cx="15" cy="90" rx="18" ry="25" fill="#6CA644" opacity="0.7" transform="rotate(15,15,90)"/>
    <ellipse cx="5" cy="130" rx="20" ry="28" fill="url(#leaf1)" opacity="0.6" transform="rotate(-10,5,130)"/>
  </g>

  <!-- Tall plant right -->
  <g transform="translate(700,210)">
    <rect x="8" y="40" width="5" height="150" rx="2" fill="#4a8c2a"/>
    <ellipse cx="12" cy="50" rx="20" ry="28" fill="url(#leaf1)" opacity="0.8" transform="rotate(15,12,50)"/>
    <ellipse cx="6" cy="85" rx="18" ry="24" fill="#6CA644" opacity="0.7" transform="rotate(-20,6,85)"/>
    <ellipse cx="14" cy="120" rx="16" ry="22" fill="url(#leaf1)" opacity="0.6" transform="rotate(10,14,120)"/>
  </g>

  <!-- Small plants -->
  <g transform="translate(50,380)" opacity="0.7">
    <rect x="4" y="10" width="3" height="25" rx="1" fill="#4a8c2a"/>
    <ellipse cx="5" cy="8" rx="10" ry="14" fill="#6CA644"/>
  </g>
  <g transform="translate(740,375)" opacity="0.7">
    <rect x="4" y="10" width="3" height="25" rx="1" fill="#4a8c2a"/>
    <ellipse cx="5" cy="8" rx="10" ry="14" fill="#6CA644"/>
  </g>

  <!-- Soil cross-section (decorative) -->
  <g transform="translate(300,410)" opacity="0.3">
    <rect width="200" height="60" rx="12" fill="#8B6914"/>
    <rect y="20" width="200" height="40" rx="8" fill="#6B4F12"/>
    <circle cx="30" cy="15" r="4" fill="#a0652f"/>
    <circle cx="80" cy="30" r="3" fill="#9e8a6a"/>
    <circle cx="140" cy="12" r="5" fill="#b8894e"/>
    <circle cx="170" cy="35" r="3" fill="#a0652f"/>
    <!-- roots -->
    <path d="M60 0 Q55 -15 50 -25" stroke="#6CA644" stroke-width="2" fill="none"/>
    <path d="M100 0 Q95 -20 85 -30" stroke="#6CA644" stroke-width="2" fill="none"/>
    <path d="M150 0 Q155 -18 160 -28" stroke="#6CA644" stroke-width="2" fill="none"/>
  </g>

  <!-- Kid 1 (left) - with tablet -->
  <g transform="translate(180,220)">
    <!-- Body -->
    <rect x="0" y="60" width="55" height="75" rx="12" fill="#0D3E2D"/>
    <!-- Head -->
    <circle cx="27" cy="35" r="28" fill="url(#skin1)"/>
    <!-- Hair -->
    <path d="M5 25 Q10 5 27 2 Q44 5 50 25 Q48 15 27 12 Q10 15 5 25Z" fill="#2c1810"/>
    <!-- Eyes -->
    <circle cx="18" cy="33" r="3.5" fill="#1a1a1a"/>
    <circle cx="36" cy="33" r="3.5" fill="#1a1a1a"/>
    <circle cx="19.5" cy="32" r="1.2" fill="white"/>
    <circle cx="37.5" cy="32" r="1.2" fill="white"/>
    <!-- Smile -->
    <path d="M18 42 Q27 50 36 42" stroke="#1a1a1a" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Arms -->
    <rect x="-15" y="75" width="22" height="10" rx="5" fill="url(#skin1)" transform="rotate(-15,-15,75)"/>
    <rect x="48" y="75" width="22" height="10" rx="5" fill="url(#skin1)" transform="rotate(15,48,75)"/>
    <!-- Tablet -->
    <rect x="5" y="95" width="45" height="35" rx="5" fill="#1a1a2e"/>
    <rect x="8" y="98" width="39" height="28" rx="3" fill="url(#tablet)"/>
    <!-- Tablet screen content -->
    <rect x="12" y="102" width="14" height="10" rx="2" fill="white" opacity="0.5"/>
    <rect x="29" y="102" width="14" height="10" rx="2" fill="white" opacity="0.3"/>
    <rect x="12" y="115" width="31" height="6" rx="2" fill="white" opacity="0.4"/>
    <!-- Legs -->
    <rect x="8" y="130" width="14" height="30" rx="6" fill="#1a1a2e"/>
    <rect x="32" y="130" width="14" height="30" rx="6" fill="#1a1a2e"/>
  </g>

  <!-- Kid 2 (center) - reading -->
  <g transform="translate(360,200)">
    <!-- Body -->
    <rect x="0" y="60" width="60" height="80" rx="12" fill="#14b8a6"/>
    <!-- Head -->
    <circle cx="30" cy="35" r="30" fill="url(#skin2)"/>
    <!-- Hair -->
    <path d="M5 22 Q15 0 30 -3 Q45 0 55 22 Q52 10 30 8 Q10 10 5 22Z" fill="#1a0f05"/>
    <circle cx="15" cy="15" r="8" fill="#1a0f05"/>
    <circle cx="45" cy="15" r="8" fill="#1a0f05"/>
    <!-- Eyes -->
    <circle cx="20" cy="33" r="4" fill="#1a1a1a"/>
    <circle cx="40" cy="33" r="4" fill="#1a1a1a"/>
    <circle cx="21.5" cy="31.5" r="1.5" fill="white"/>
    <circle cx="41.5" cy="31.5" r="1.5" fill="white"/>
    <!-- Smile -->
    <path d="M20 44 Q30 54 40 44" stroke="#1a1a1a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Book -->
    <rect x="-5" y="90" width="35" height="45" rx="4" fill="white" transform="rotate(-10,-5,90)"/>
    <rect x="30" y="90" width="35" height="45" rx="4" fill="#f0f0f0" transform="rotate(10,30,90)"/>
    <line x1="30" y1="88" x2="30" y2="136" stroke="#ddd" stroke-width="2"/>
    <!-- Book lines -->
    <rect x="3" y="100" width="20" height="3" rx="1" fill="#6CA644" opacity="0.5" transform="rotate(-10,3,100)"/>
    <rect x="3" y="108" width="16" height="3" rx="1" fill="#6CA644" opacity="0.3" transform="rotate(-10,3,108)"/>
    <!-- Arms -->
    <rect x="-18" y="75" width="24" height="12" rx="6" fill="url(#skin2)" transform="rotate(-20,-18,75)"/>
    <rect x="54" y="75" width="24" height="12" rx="6" fill="url(#skin2)" transform="rotate(20,54,75)"/>
    <!-- Legs -->
    <rect x="10" y="135" width="15" height="32" rx="7" fill="#1a1a2e"/>
    <rect x="35" y="135" width="15" height="32" rx="7" fill="#1a1a2e"/>
  </g>

  <!-- Kid 3 (right) - with laptop -->
  <g transform="translate(550,230)">
    <!-- Body -->
    <rect x="0" y="55" width="55" height="70" rx="12" fill="#6366f1"/>
    <!-- Head -->
    <circle cx="27" cy="30" r="28" fill="url(#skin3)"/>
    <!-- Hijab -->
    <path d="M0 20 Q5 -5 27 -8 Q50 -5 55 20 Q55 40 50 55 L5 55 Q0 40 0 20Z" fill="#14b8a6" opacity="0.9"/>
    <path d="M5 25 Q10 8 27 5 Q44 8 50 25 Q48 35 27 32 Q8 35 5 25Z" fill="url(#skin3)"/>
    <!-- Eyes -->
    <circle cx="18" cy="28" r="3.5" fill="#1a1a1a"/>
    <circle cx="36" cy="28" r="3.5" fill="#1a1a1a"/>
    <circle cx="19.5" cy="27" r="1.2" fill="white"/>
    <circle cx="37.5" cy="27" r="1.2" fill="white"/>
    <!-- Smile -->
    <path d="M18 37 Q27 45 36 37" stroke="#1a1a1a" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Laptop -->
    <rect x="-10" y="85" width="75" height="45" rx="5" fill="#1a1a2e"/>
    <rect x="-6" y="88" width="67" height="36" rx="3" fill="#2dd4bf" opacity="0.8"/>
    <!-- Screen content -->
    <circle cx="28" cy="100" r="8" fill="white" opacity="0.3"/>
    <rect x="8" y="112" width="45" height="5" rx="2" fill="white" opacity="0.4"/>
    <rect x="8" y="120" width="30" height="3" rx="1" fill="white" opacity="0.3"/>
    <!-- Keyboard base -->
    <path d="M-15 130 L70 130 L65 140 L-10 140Z" fill="#2a2a3e" rx="3"/>
    <!-- Arms -->
    <rect x="-15" y="70" width="20" height="10" rx="5" fill="url(#skin3)"/>
    <rect x="50" y="70" width="20" height="10" rx="5" fill="url(#skin3)"/>
    <!-- Legs -->
    <rect x="8" y="120" width="14" height="30" rx="6" fill="#1a1a2e"/>
    <rect x="32" y="120" width="14" height="30" rx="6" fill="#1a1a2e"/>
  </g>

  <!-- Floating elements -->
  <!-- Leaf particles -->
  <g opacity="0.5">
    <ellipse cx="130" cy="150" rx="8" ry="12" fill="#6CA644" transform="rotate(-30,130,150)"/>
    <ellipse cx="320" cy="120" rx="6" ry="10" fill="#81c784" transform="rotate(20,320,120)"/>
    <ellipse cx="500" cy="140" rx="7" ry="11" fill="#6CA644" transform="rotate(-45,500,140)"/>
    <ellipse cx="660" cy="160" rx="5" ry="8" fill="#4caf50" transform="rotate(30,660,160)"/>
  </g>

  <!-- Sparkles -->
  <g fill="#fbbf24" opacity="0.6">
    <path d="M250 100 L253 108 L260 108 L254 113 L256 120 L250 116 L244 120 L246 113 L240 108 L247 108Z" transform="scale(0.6)"/>
    <path d="M650 180 L653 188 L660 188 L654 193 L656 200 L650 196 L644 200 L646 193 L640 188 L647 188Z" transform="scale(0.5)"/>
    <path d="M450 80 L453 88 L460 88 L454 93 L456 100 L450 96 L444 100 L446 93 L440 88 L447 88Z" transform="scale(0.5)"/>
  </g>

  <!-- Small flower -->
  <g transform="translate(160,365)">
    <rect x="4" y="5" width="3" height="20" rx="1" fill="#4a8c2a"/>
    <circle cx="5" cy="3" r="5" fill="#fbbf24" opacity="0.7"/>
    <circle cx="5" cy="3" r="2.5" fill="#fef3c7"/>
  </g>
  <g transform="translate(640,360)">
    <rect x="4" y="5" width="3" height="20" rx="1" fill="#4a8c2a"/>
    <circle cx="5" cy="3" r="5" fill="#a78bfa" opacity="0.7"/>
    <circle cx="5" cy="3" r="2.5" fill="#ede9fe"/>
  </g>

  <!-- Watering can (decorative) -->
  <g transform="translate(460,370)" opacity="0.5">
    <rect x="0" y="5" width="25" height="18" rx="4" fill="#6CA644"/>
    <rect x="20" y="0" width="15" height="5" rx="2" fill="#6CA644"/>
    <path d="M35 2 L42 -5 L45 -5 L45 0 L38 5" fill="#6CA644"/>
    <!-- Water drops -->
    <ellipse cx="43" cy="-2" rx="2" ry="3" fill="#60a5fa" opacity="0.5"/>
    <ellipse cx="47" cy="2" rx="1.5" ry="2.5" fill="#60a5fa" opacity="0.4"/>
  </g>
</svg>