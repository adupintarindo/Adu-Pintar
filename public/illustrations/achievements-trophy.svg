<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="aSkin" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#c68642"/><stop offset="100%" stop-color="#a0652f"/></linearGradient>
    <linearGradient id="aGold" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#fbbf24"/><stop offset="100%" stop-color="#d4a843"/></linearGradient>
  </defs>

  <rect width="400" height="300" fill="#f0fdf4"/>
  <circle cx="200" cy="150" r="120" fill="#fbbf24" opacity="0.04"/>

  <!-- Big trophy -->
  <g transform="translate(140,30)">
    <path d="M30 0 L90 0 L85 50 Q60 70 35 50Z" fill="url(#aGold)"/>
    <rect x="48" y="50" width="24" height="20" rx="3" fill="#d4a843"/>
    <rect x="38" y="70" width="44" height="12" rx="4" fill="#fbbf24"/>
    <!-- Handles -->
    <path d="M25 8 Q5 15 10 40 Q15 50 30 45" stroke="#fbbf24" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M95 8 Q115 15 110 40 Q105 50 90 45" stroke="#fbbf24" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- Star on trophy -->
    <g transform="translate(60,22)">
      <path d="M0 -10 L3 -3 L10 -3 L5 2 L7 10 L0 6 L-7 10 L-5 2 L-10 -3 L-3 -3Z" fill="white" opacity="0.6"/>
    </g>
    <!-- Shine -->
    <line x1="42" y1="10" x2="42" y2="30" stroke="white" stroke-width="2" opacity="0.3" stroke-linecap="round"/>
  </g>

  <!-- Kid celebrating -->
  <g transform="translate(50,120)">
    <rect x="15" y="55" width="45" height="58" rx="10" fill="#6CA644"/>
    <circle cx="37" cy="30" r="23" fill="url(#aSkin)"/>
    <path d="M17 20 Q22 5 37 2 Q52 5 57 20 Q54 12 37 10 Q20 12 17 20Z" fill="#1a0f05"/>
    <circle cx="29" cy="28" r="3" fill="#1a1a1a"/>
    <circle cx="45" cy="28" r="3" fill="#1a1a1a"/>
    <circle cx="30.3" cy="27" r="1.1" fill="white"/>
    <circle cx="46.3" cy="27" r="1.1" fill="white"/>
    <!-- Big happy smile -->
    <path d="M26 38 Q37 48 48 38" stroke="#1a1a1a" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M28 40 L46 40" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Arms up -->
    <rect x="-8" y="50" width="26" height="10" rx="5" fill="url(#aSkin)" transform="rotate(-60,-8,50)"/>
    <rect x="52" y="50" width="26" height="10" rx="5" fill="url(#aSkin)" transform="rotate(60,52,50)"/>
    <rect x="20" y="108" width="12" height="26" rx="5" fill="#1e3a5f"/>
    <rect x="42" y="108" width="12" height="26" rx="5" fill="#1e3a5f"/>
  </g>

  <!-- Badges floating -->
  <g transform="translate(300,100)">
    <circle cx="25" cy="25" r="22" fill="#6CA644" opacity="0.15"/>
    <circle cx="25" cy="25" r="16" fill="#6CA644" opacity="0.1"/>
    <path d="M18 25 L23 30 L33 20" stroke="#6CA644" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <g transform="translate(280,170)">
    <circle cx="20" cy="20" r="18" fill="#14b8a6" opacity="0.15"/>
    <circle cx="20" cy="20" r="13" fill="#14b8a6" opacity="0.1"/>
    <path d="M14 20 L18 24 L26 16" stroke="#14b8a6" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Confetti -->
  <g opacity="0.35">
    <rect x="80" y="30" width="6" height="10" rx="2" fill="#6CA644" transform="rotate(30,80,30)"/>
    <rect x="240" y="20" width="5" height="8" rx="1.5" fill="#14b8a6" transform="rotate(-20,240,20)"/>
    <rect x="320" y="40" width="6" height="10" rx="2" fill="#fbbf24" transform="rotate(45,320,40)"/>
    <circle cx="120" cy="45" r="3" fill="#fbbf24"/>
    <circle cx="280" cy="50" r="2.5" fill="#6CA644"/>
    <rect x="180" y="25" width="4" height="6" rx="1" fill="#14b8a6" transform="rotate(60,180,25)"/>
  </g>

  <!-- Level up text -->
  <g transform="translate(120,255)" opacity="0.5">
    <rect x="0" y="0" width="75" height="28" rx="10" fill="#fbbf24" opacity="0.15"/>
    <text x="37" y="18" font-family="sans-serif" font-size="9" fill="#d4a843" text-anchor="middle" font-weight="bold">Level Up!</text>
  </g>
  <g transform="translate(210,255)" opacity="0.5">
    <rect x="0" y="0" width="75" height="28" rx="10" fill="#6CA644" opacity="0.12"/>
    <text x="37" y="18" font-family="sans-serif" font-size="9" fill="#6CA644" text-anchor="middle" font-weight="bold">8 Badge</text>
  </g>
</svg>