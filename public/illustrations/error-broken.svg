<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 350" fill="none">
  <defs>
    <linearGradient id="skinE" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4a76a"/>
      <stop offset="100%" stop-color="#b8894e"/>
    </linearGradient>
    <linearGradient id="screenCrack" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="sproutG" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#4a8c2a"/>
      <stop offset="100%" stop-color="#6CA644"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <circle cx="200" cy="170" r="140" fill="#7c3aed" opacity="0.05"/>
  <circle cx="200" cy="170" r="100" fill="#6CA644" opacity="0.05"/>

  <!-- Ground -->
  <ellipse cx="200" cy="310" rx="160" ry="18" fill="#6CA644" opacity="0.12"/>

  <!-- Laptop/Computer -->
  <g transform="translate(120,130)">
    <!-- Screen -->
    <rect x="0" y="0" width="160" height="105" rx="10" fill="#2a2a3e"/>
    <rect x="6" y="6" width="148" height="88" rx="6" fill="url(#screenCrack)" opacity="0.15"/>
    <!-- Crack lines -->
    <path d="M80 6 L65 40 L85 55 L70 94" stroke="#7c3aed" stroke-width="2" opacity="0.4" fill="none"/>
    <path d="M65 40 L50 50" stroke="#7c3aed" stroke-width="1.5" opacity="0.3" fill="none"/>
    <path d="M85 55 L100 48" stroke="#7c3aed" stroke-width="1.5" opacity="0.3" fill="none"/>
    <!-- Sad face on screen -->
    <circle cx="60" cy="50" r="5" fill="#a78bfa" opacity="0.5"/>
    <circle cx="100" cy="50" r="5" fill="#a78bfa" opacity="0.5"/>
    <path d="M55 70 Q80 60 105 70" stroke="#a78bfa" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.5"/>
    <!-- Keyboard base -->
    <path d="M-10 105 L170 105 L160 125 L0 125Z" fill="#3a3a4e" rx="4"/>
    <rect x="10" y="110" width="140" height="10" rx="3" fill="#4a4a5e" opacity="0.5"/>
  </g>

  <!-- Plant growing from keyboard! -->
  <g transform="translate(195,120)">
    <!-- Stem -->
    <path d="M5 30 Q3 10 8 -10 Q10 -25 5 -40" stroke="url(#sproutG)" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <!-- Leaves -->
    <ellipse cx="-5" cy="-15" rx="12" ry="8" fill="#6CA644" opacity="0.8" transform="rotate(-30,-5,-15)"/>
    <ellipse cx="18" cy="-25" rx="10" ry="7" fill="#81c784" opacity="0.7" transform="rotate(25,18,-25)"/>
    <ellipse cx="0" cy="-40" rx="8" ry="6" fill="#6CA644" opacity="0.9" transform="rotate(-15,0,-40)"/>
    <!-- Small flower -->
    <circle cx="5" cy="-50" r="6" fill="#fbbf24" opacity="0.6"/>
    <circle cx="5" cy="-50" r="3" fill="#fef3c7"/>
    <!-- Sparkles around plant -->
    <circle cx="-15" cy="-35" r="2" fill="#6CA644" opacity="0.4"/>
    <circle cx="25" cy="-45" r="1.5" fill="#81c784" opacity="0.4"/>
    <circle cx="15" cy="-55" r="1.8" fill="#6CA644" opacity="0.3"/>
  </g>

  <!-- Kid character (sad but hopeful) -->
  <g transform="translate(60,150)">
    <!-- Body -->
    <rect x="10" y="65" width="50" height="70" rx="12" fill="#0D3E2D"/>
    <!-- Head -->
    <circle cx="35" cy="40" r="28" fill="url(#skinE)"/>
    <!-- Hair -->
    <path d="M10 28 Q15 5 35 0 Q55 5 60 28 Q58 15 35 12 Q14 15 10 28Z" fill="#1a0f05"/>
    <!-- Eyes (worried/sad) -->
    <circle cx="25" cy="38" r="4" fill="#1a1a1a"/>
    <circle cx="45" cy="38" r="4" fill="#1a1a1a"/>
    <circle cx="26.5" cy="36.5" r="1.5" fill="white"/>
    <circle cx="46.5" cy="36.5" r="1.5" fill="white"/>
    <!-- Worried eyebrows -->
    <path d="M18 30 Q23 27 30 31" stroke="#1a0f05" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M40 31 Q47 27 52 30" stroke="#1a0f05" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Slight worried smile -->
    <path d="M27 52 Q35 48 43 52" stroke="#1a1a1a" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Blush -->
    <ellipse cx="18" cy="46" rx="5" ry="3" fill="#fca5a5" opacity="0.2"/>
    <ellipse cx="52" cy="46" rx="5" ry="3" fill="#fca5a5" opacity="0.2"/>
    <!-- Arms pointing at screen -->
    <rect x="55" y="80" width="30" height="11" rx="5" fill="url(#skinE)" transform="rotate(-10,55,80)"/>
    <rect x="-15" y="85" width="28" height="11" rx="5" fill="url(#skinE)" transform="rotate(5,-15,85)"/>
    <!-- Legs -->
    <rect x="18" y="130" width="14" height="30" rx="6" fill="#1e3a5f"/>
    <rect x="40" y="130" width="14" height="30" rx="6" fill="#1e3a5f"/>
    <!-- Shoes -->
    <ellipse cx="25" cy="160" rx="10" ry="5" fill="#2a2a3e"/>
    <ellipse cx="47" cy="160" rx="10" ry="5" fill="#2a2a3e"/>
  </g>

  <!-- Error symbols -->
  <g opacity="0.3">
    <circle cx="320" cy="100" r="15" stroke="#7c3aed" stroke-width="2" fill="none"/>
    <text x="320" y="106" font-family="sans-serif" font-size="18" fill="#7c3aed" text-anchor="middle" font-weight="bold">!</text>
    <circle cx="100" cy="90" r="12" stroke="#7c3aed" stroke-width="2" fill="none"/>
    <text x="100" y="95" font-family="sans-serif" font-size="14" fill="#7c3aed" text-anchor="middle" font-weight="bold">!</text>
  </g>

  <!-- Hope sparkles -->
  <g fill="#6CA644" opacity="0.35">
    <path d="M250 90 L252 96 L258 96 L253 100 L255 106 L250 102 L245 106 L247 100 L242 96 L248 96Z"/>
    <path d="M310 170 L312 175 L317 175 L313 178 L315 183 L310 180 L305 183 L307 178 L302 175 L308 175Z" transform="scale(0.8)"/>
    <path d="M340 130 L342 135 L347 135 L343 138 L345 143 L340 140 L335 143 L337 138 L332 135 L338 135Z" transform="scale(0.7)"/>
  </g>
</svg>