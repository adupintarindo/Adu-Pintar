<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 350" fill="none">
  <defs>
    <linearGradient id="bg404" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0fdf4"/>
      <stop offset="100%" stop-color="#ecfdf5"/>
    </linearGradient>
    <linearGradient id="hat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#d4a843"/>
    </linearGradient>
    <linearGradient id="skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5d0a9"/>
      <stop offset="100%" stop-color="#e8b888"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="175" r="140" fill="#6CA644" opacity="0.08"/>
  <circle cx="200" cy="175" r="100" fill="#6CA644" opacity="0.06"/>

  <!-- Ground -->
  <ellipse cx="200" cy="310" rx="160" ry="20" fill="#6CA644" opacity="0.15"/>

  <!-- Signpost left -->
  <g transform="translate(80,100)">
    <rect x="8" y="0" width="6" height="180" rx="2" fill="#8B6914"/>
    <!-- Sign boards -->
    <rect x="-30" y="15" width="70" height="22" rx="5" fill="#0D3E2D"/>
    <text x="5" y="30" font-family="sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="bold">KIRI?</text>
    <polygon points="-30,15 -38,26 -30,37" fill="#0D3E2D"/>
    <rect x="-20" y="50" width="60" height="22" rx="5" fill="#14b8a6"/>
    <text x="10" y="65" font-family="sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="bold">ATAS?</text>
    <polygon points="40,50 48,61 40,72" fill="#14b8a6"/>
  </g>

  <!-- Signpost right -->
  <g transform="translate(280,110)">
    <rect x="8" y="0" width="6" height="170" rx="2" fill="#8B6914"/>
    <rect x="-10" y="20" width="65" height="22" rx="5" fill="#6CA644"/>
    <text x="22" y="35" font-family="sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="bold">KANAN?</text>
    <polygon points="55,20 63,31 55,42" fill="#6CA644"/>
    <rect x="-25" y="55" width="65" height="22" rx="5" fill="#0D3E2D"/>
    <text x="8" y="70" font-family="sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="bold">BAWAH?</text>
    <polygon points="-25,55 -33,66 -25,77" fill="#0D3E2D"/>
  </g>

  <!-- Kid character -->
  <g transform="translate(160,120)">
    <!-- Body -->
    <rect x="15" y="85" width="55" height="80" rx="14" fill="#14b8a6"/>
    <!-- White collar detail -->
    <path d="M25 85 Q42 100 60 85" stroke="white" stroke-width="3" fill="none" opacity="0.5"/>

    <!-- Straw hat -->
    <ellipse cx="42" cy="22" rx="45" ry="12" fill="url(#hat)"/>
    <path d="M18 22 Q20 -5 42 -10 Q64 -5 66 22" fill="url(#hat)"/>
    <ellipse cx="42" cy="22" rx="35" ry="8" fill="#c9982e" opacity="0.3"/>
    <!-- Hat ribbon -->
    <rect x="18" y="16" width="48" height="6" rx="2" fill="#6CA644"/>

    <!-- Head -->
    <circle cx="42" cy="48" r="30" fill="url(#skin)"/>

    <!-- Hair peeking from hat -->
    <path d="M15 35 Q18 28 25 30" fill="#2c1810"/>
    <path d="M59 30 Q66 28 69 35" fill="#2c1810"/>

    <!-- Eyes (confused look) -->
    <circle cx="32" cy="47" r="4.5" fill="#1a1a1a"/>
    <circle cx="52" cy="47" r="4.5" fill="#1a1a1a"/>
    <circle cx="33.5" cy="45.5" r="1.8" fill="white"/>
    <circle cx="53.5" cy="45.5" r="1.8" fill="white"/>
    <!-- Eyebrows (confused) -->
    <path d="M25 38 Q30 35 37 39" stroke="#2c1810" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M47 39 Q54 35 59 38" stroke="#2c1810" stroke-width="2.5" fill="none" stroke-linecap="round"/>

    <!-- Confused mouth -->
    <path d="M33 60 Q38 58 42 62 Q46 58 51 60" stroke="#1a1a1a" stroke-width="2" fill="none" stroke-linecap="round"/>

    <!-- Blush -->
    <ellipse cx="24" cy="55" rx="6" ry="3.5" fill="#fca5a5" opacity="0.25"/>
    <ellipse cx="60" cy="55" rx="6" ry="3.5" fill="#fca5a5" opacity="0.25"/>

    <!-- Left arm holding map -->
    <rect x="-8" y="95" width="28" height="12" rx="6" fill="url(#skin)" transform="rotate(-25,-8,95)"/>
    <!-- Map -->
    <g transform="translate(-25,75) rotate(-15)">
      <rect width="35" height="28" rx="3" fill="#fffbeb"/>
      <rect x="2" y="2" width="31" height="24" rx="2" fill="#fef3c7"/>
      <!-- Map lines -->
      <path d="M8 8 L15 12 L22 8 L28 14" stroke="#6CA644" stroke-width="1.5" fill="none" opacity="0.6"/>
      <path d="M5 16 L12 20 L20 16 L28 20" stroke="#14b8a6" stroke-width="1.5" fill="none" opacity="0.5"/>
      <circle cx="18" cy="14" r="2.5" fill="#6CA644" opacity="0.4"/>
      <!-- X mark -->
      <path d="M14 10 L22 18 M22 10 L14 18" stroke="#6CA644" stroke-width="1.5" opacity="0.5"/>
    </g>

    <!-- Right arm scratching head -->
    <rect x="65" y="90" width="25" height="12" rx="6" fill="url(#skin)" transform="rotate(30,65,90)"/>

    <!-- Legs -->
    <rect x="22" y="160" width="16" height="35" rx="7" fill="#1e3a5f"/>
    <rect x="48" y="160" width="16" height="35" rx="7" fill="#1e3a5f"/>
    <!-- Shoes -->
    <ellipse cx="30" cy="195" rx="12" ry="6" fill="#0D3E2D"/>
    <ellipse cx="56" cy="195" rx="12" ry="6" fill="#0D3E2D"/>
  </g>

  <!-- Question marks floating -->
  <g fill="#6CA644" opacity="0.4" font-family="sans-serif" font-weight="bold">
    <text x="120" cy="100" font-size="28" transform="rotate(-15,120,100)">?</text>
    <text x="280" cy="90" font-size="22" transform="rotate(10,280,90)">?</text>
    <text x="100" cy="250" font-size="18" transform="rotate(-5,100,250)">?</text>
    <text x="310" cy="240" font-size="24" transform="rotate(12,310,240)">?</text>
  </g>

  <!-- Small plants at base -->
  <g transform="translate(120,285)" opacity="0.6">
    <rect x="3" y="5" width="2.5" height="18" rx="1" fill="#4a8c2a"/>
    <ellipse cx="4" cy="3" rx="7" ry="10" fill="#6CA644"/>
  </g>
  <g transform="translate(270,290)" opacity="0.6">
    <rect x="3" y="5" width="2.5" height="15" rx="1" fill="#4a8c2a"/>
    <ellipse cx="4" cy="3" rx="6" ry="9" fill="#81c784"/>
  </g>
</svg>