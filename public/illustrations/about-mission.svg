    <line x1="250" y1="130" x2="350" y2="120"/>
    <line x1="350" y1="120" x2="480" y2="140"/>
    <line x1="120" y1="150" x2="200" y2="220"/>
    <line x1="200" y1="220" x2="350" y2="240"/>
    <line x1="350" y1="240" x2="480" y2="200"/>
