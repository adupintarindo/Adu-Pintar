    <linearGradient id="aLeaf" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#6CA644"/><stop offset="100%" stop-color="#0D3E2D"/></linearGradient>
  </defs>

  <rect width="600" height="350" fill="#f0fdf4"/>
  <circle cx="300" cy="175" r="160" fill="url(#aGrad)"/>

  <!-- Network/connection lines -->
  <g stroke="#6CA644" stroke-width="1" opacity="0.2" fill="none">
