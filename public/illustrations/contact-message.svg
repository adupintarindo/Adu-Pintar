<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="cSkin" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f5d0a9"/><stop offset="100%" stop-color="#e8b888"/></linearGradient>
    <linearGradient id="plane" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="white"/><stop offset="100%" stop-color="#f0fdf4"/></linearGradient>
  </defs>

  <rect width="400" height="300" fill="#f0fdf4"/>
  <circle cx="200" cy="150" r="120" fill="#6CA644" opacity="0.06"/>

  <!-- Kid character -->
  <g transform="translate(50,100)">
    <rect x="15" y="60" width="48" height="65" rx="12" fill="#6CA644"/>
    <circle cx="39" cy="35" r="26" fill="url(#cSkin)"/>
    <path d="M16 24 Q22 4 39 0 Q56 4 62 24 Q59 12 39 10 Q19 12 16 24Z" fill="#2c1810"/>
    <circle cx="30" cy="33" r="3.5" fill="#1a1a1a"/>
    <circle cx="48" cy="33" r="3.5" fill="#1a1a1a"/>
    <circle cx="31.5" cy="31.5" r="1.3" fill="white"/>
    <circle cx="49.5" cy="31.5" r="1.3" fill="white"/>
    <path d="M28 45 Q39 53 50 45" stroke="#1a1a1a" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Arm throwing -->
    <rect x="58" y="60" width="30" height="11" rx="5" fill="url(#cSkin)" transform="rotate(-35,58,60)"/>
    <rect x="-8" y="80" width="26" height="11" rx="5" fill="url(#cSkin)" transform="rotate(10,-8,80)"/>
    <rect x="22" y="120" width="13" height="30" rx="6" fill="#1e3a5f"/>
    <rect x="43" y="120" width="13" height="30" rx="6" fill="#1e3a5f"/>
  </g>

  <!-- Paper airplane -->
  <g transform="translate(160,80) rotate(-15)">
    <path d="M0 15 L50 0 L20 15 L50 30Z" fill="url(#plane)" stroke="#6CA644" stroke-width="1.5"/>
    <line x1="20" y1="15" x2="50" y2="15" stroke="#6CA644" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Trail from airplane - leaves and flowers -->
  <g opacity="0.5">
    <!-- Leaf trail -->
    <ellipse cx="220" cy="85" rx="6" ry="9" fill="#6CA644" transform="rotate(-30,220,85)"/>
    <ellipse cx="250" cy="95" rx="5" ry="8" fill="#81c784" transform="rotate(20,250,95)"/>
    <ellipse cx="280" cy="90" rx="7" ry="10" fill="#6CA644" transform="rotate(-15,280,90)"/>
    <ellipse cx="310" cy="100" rx="5" ry="7" fill="#4caf50" transform="rotate(30,310,100)"/>
    <ellipse cx="340" cy="95" rx="6" ry="9" fill="#81c784" transform="rotate(-25,340,95)"/>
    <!-- Small flowers -->
    <circle cx="235" cy="110" r="4" fill="#fbbf24" opacity="0.6"/>
    <circle cx="235" cy="110" r="2" fill="#fef3c7"/>
    <circle cx="295" cy="115" r="3.5" fill="#a78bfa" opacity="0.6"/>
    <circle cx="295" cy="115" r="1.8" fill="#ede9fe"/>
    <circle cx="355" cy="108" r="4" fill="#2dd4bf" opacity="0.6"/>
    <circle cx="355" cy="108" r="2" fill="#ccfbf1"/>
  </g>

  <!-- Dotted trail path -->
  <path d="M180 95 Q250 70 320 90 Q360 100 380 85" stroke="#6CA644" stroke-width="1.5" stroke-dasharray="4,6" fill="none" opacity="0.25"/>

  <!-- Envelope floating -->
  <g transform="translate(300,130)">
    <rect x="0" y="0" width="60" height="42" rx="5" fill="white" stroke="#6CA644" stroke-width="1.5"/>
    <path d="M0 0 L30 22 L60 0" stroke="#6CA644" stroke-width="1.5" fill="none"/>
    <path d="M0 42 L22 24" stroke="#6CA644" stroke-width="1" fill="none" opacity="0.4"/>
    <path d="M60 42 L38 24" stroke="#6CA644" stroke-width="1" fill="none" opacity="0.4"/>
  </g>

  <!-- Speech bubbles -->
  <g transform="translate(260,170)" opacity="0.4">
    <rect x="0" y="0" width="80" height="35" rx="12" fill="#14b8a6" opacity="0.15" stroke="#14b8a6" stroke-width="1"/>
    <rect x="8" y="10" width="40" height="4" rx="2" fill="#14b8a6" opacity="0.3"/>
    <rect x="8" y="20" width="55" height="4" rx="2" fill="#14b8a6" opacity="0.2"/>
    <polygon points="15,35 25,45 30,35" fill="#14b8a6" opacity="0.15"/>
  </g>

  <g transform="translate(280,215)" opacity="0.3">
    <rect x="0" y="0" width="70" height="30" rx="10" fill="#6CA644" opacity="0.15" stroke="#6CA644" stroke-width="1"/>
    <rect x="8" y="8" width="45" height="4" rx="2" fill="#6CA644" opacity="0.3"/>
    <rect x="8" y="17" width="30" height="4" rx="2" fill="#6CA644" opacity="0.2"/>
    <polygon points="45,30 55,40 58,30" fill="#6CA644" opacity="0.15"/>
  </g>

  <!-- Sparkles -->
  <g fill="#fbbf24" opacity="0.35">
    <path d="M180 60 L182 66 L188 66 L183 70 L185 76 L180 72 L175 76 L177 70 L172 66 L178 66Z" transform="scale(0.6)"/>
    <path d="M350 60 L352 66 L358 66 L353 70 L355 76 L350 72 L345 76 L347 70 L342 66 L348 66Z" transform="scale(0.5)"/>
  </g>
</svg>